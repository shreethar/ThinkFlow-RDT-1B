seed: 42
rdt_repo: /workspace/RoboticsDiffusionTransformer
pretrained_model: robotics-diffusion-transformer/rdt-1b
output_dir: outputs/b0_sft_rdt1b_lora

model:
  action_dim: 7
  state_dim: 7
  pred_horizon: 64
  qwen_hidden_size: 2560
  qwen_kv_dim: 2048
  max_lang_tokens: 128
  image_tokens: 512
  hidden_size: 2048
  depth: 28
  num_heads: 32
  dtype: bfloat16
  lang_adaptor: linear
  img_adaptor: linear
  state_adaptor: mlp3x_gelu
  copy_pretrained_final_fc1: true
  gradient_checkpointing: true

lora:
  rank: 32
  alpha: 64
  dropout: 0.05
  target_self_attention: true
  target_cross_attention: true
  target_ffn: true
  train_final_layer: true

noise_scheduler:
  num_train_timesteps: 1000
  num_inference_timesteps: 5
  beta_schedule: squaredcos_cap_v2
  prediction_type: sample
  clip_sample: false

data:
  train_manifest: /absolute/path/to/cache/train/manifest.jsonl
  val_manifest: /absolute/path/to/cache/val/manifest.jsonl
  num_workers: 4
  pin_memory: true
  persistent_workers: true

training:
  max_steps: 20000
  micro_batch_size: 1
  gradient_accumulation_steps: 32
  learning_rate_lora: 1.0e-4
  learning_rate_interfaces: 1.0e-4
  weight_decay_interfaces: 0.01
  warmup_steps: 500
  max_grad_norm: 1.0
  log_every: 10
  validate_every: 500
  save_every: 1000
  validation_batches: 20
  sample_validation_batches: 2
  mixed_precision: bf16
  report_to: tensorboard
